<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us - ShopEasy</title>
  <link rel="stylesheet" href="contact.css" />
</head>
<body>
  <div class="contact-container">
    <h1>Contact Us</h1>
    <p>We’d love to hear from you! Fill out the form below or reach us at support@shopeasy.com.</p>

    <form id="contact-form">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required />

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <button type="submit">Send Message</button>
    </form>

    <div class="contact-info">
      <h3>Other Ways to Reach Us</h3>
      <p><strong>Email:</strong> support@shopeasy.com</p>
      <p><strong>Phone:</strong> +91 9131225526</p>
      <p><strong>Address:</strong> 123 Market Street,hanumangarh (raj)</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
